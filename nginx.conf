events {
    worker_connections 1024;
}

http {
    upstream doris-fe {
        server doris-fe:8030;
    }

    upstream doris-be {
        server doris-be:8040;
    }

    # Doris FE Web UI 代理
    server {
        listen 80;
        server_name doris-fe.local;
        
        location / {
            proxy_pass http://doris-fe;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Doris BE HTTP 代理
    server {
        listen 80;
        server_name doris-be.local;
        
        location / {
            proxy_pass http://doris-be;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # API 健康检查端点
        location /api/health {
            proxy_pass http://doris-be/api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 状态监控页面
    server {
        listen 80;
        server_name doris-status.local;
        
        location / {
            return 200 'Doris 3.1.4 状态监控\n\nFE Web UI: http://localhost:8030\nFE MySQL: localhost:9030\nBE HTTP: localhost:8040\n\nServices:\n- Frontend: http://doris-fe:8030\n- Backend: http://doris-be:8040\n';
            add_header Content-Type text/plain;
        }
    }
}